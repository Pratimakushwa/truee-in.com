<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Truee_Luxury_Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truee Luxury | Premium Experience</title>

    <style>
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loader-text {
        font-family: serif;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        font-size: 12px;
        color: #1a1a1a;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { opacity: 0.3; }
        50% { opacity: 1; }
        100% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-text">Truee Luxury</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>
  </body>
</html>
